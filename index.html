<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Страница со ссылками</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.18), transparent 35%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 560px);
      background: rgba(17, 24, 39, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.15;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }

    .buttons {
      display: grid;
      gap: 14px;
    }

    .button-link {
      display: block;
      text-decoration: none;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: var(--accent);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 18px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .tg-env-badge {
      display: none;
      align-items: center;
      gap: 8px;
      width: fit-content;
      max-width: 100%;
      margin: 0 0 14px;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: #052e16;
      background: linear-gradient(180deg, #4ade80 0%, #22c55e 100%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 4px 14px rgba(34, 197, 94, 0.35);
    }

    .tg-env-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #15803d;
      box-shadow: 0 0 0 2px rgba(21, 128, 61, 0.35);
    }

    .tg-env-badge.is-visible {
      display: inline-flex;
    }
  </style>
</head>
<body>
  <main class="card">
    <div id="tg-env-badge" class="tg-env-badge" role="status" aria-live="polite">Мы в Telegram</div>
    <h1>Ссылки</h1>
    <p>Откройте нужный вариант по кнопке ниже.</p>

    <div class="buttons">
      <a class="button-link" href="https://t.leads.tech/click/1401/676/?sub1=zaimivsemru-of-list-nebusfinance-676&amp;sub2=none-none&amp;sub3=none&amp;sub4=none&amp;sub5=none&amp;sub6=none&amp;sub7=none&amp;sub8=we_website%3A6169%3Bwe_ws%3A23818%3Bwe_offer%3A666%3Bltt_offer%3A676%3Bwe_position%3A4%3Bwe_webmaster%3A778%3Bltt_webmaster%3A1401%3Bvisit_id%3A1650927758%3Bpers_model%3Anone%3Bsplit%3Aoff%3Butm_src%3Anone%3Bwm_id%3Anone%3BClientID%3A1774535110931852774%3B&amp;sub9=zaimivsemru&amp;sub10=%7Bcid%7D&amp;erid=2W5zFK5yusW" target="_blank" rel="noopener" referrerpolicy="unsafe-url">
        <button type="button">Кнопка 1 — с ERID</button>
      </a>

      <a class="button-link" href="https://t.leads.tech/click/1401/676/?sub1=zaimivsemru-of-list-nebusfinance-676&amp;sub2=none-none&amp;sub3=none&amp;sub4=none&amp;sub5=none&amp;sub6=none&amp;sub7=none&amp;sub8=we_website%3A6169%3Bwe_ws%3A23818%3Bwe_offer%3A666%3Bltt_offer%3A676%3Bwe_position%3A4%3Bwe_webmaster%3A778%3Bltt_webmaster%3A1401%3Bvisit_id%3A1650927758%3Bpers_model%3Anone%3Bsplit%3Aoff%3Butm_src%3Anone%3Bwm_id%3Anone%3BClientID%3A1774535110931852774%3B&amp;sub9=zaimivsemru&amp;sub10=%7Bcid%7D&amp;erid=" target="_blank" rel="noopener" referrerpolicy="unsafe-url">
        <button type="button">Кнопка 2 — пустой ERID</button>
      </a>

      <a class="button-link" href="https://t.leads.tech/click/1401/676/?sub1=zaimivsemru-of-list-nebusfinance-676&amp;sub2=none-none&amp;sub3=none&amp;sub4=none&amp;sub5=none&amp;sub6=none&amp;sub7=none&amp;sub8=we_website%3A6169%3Bwe_ws%3A23818%3Bwe_offer%3A666%3Bltt_offer%3A676%3Bwe_position%3A4%3Bwe_webmaster%3A778%3Bltt_webmaster%3A1401%3Bvisit_id%3A1650927758%3Bpers_model%3Anone%3Bsplit%3Aoff%3Butm_src%3Anone%3Bwm_id%3Anone%3BClientID%3A1774535110931852774%3B&amp;sub9=zaimivsemru&amp;sub10=%7Bcid%7D" target="_blank" rel="noopener" referrerpolicy="unsafe-url">
        <button type="button">Кнопка 3 — без ERID</button>
      </a>

      <a class="button-link" href="https://t.leads.tech/click/1401/676/" target="_blank" rel="noopener" referrerpolicy="unsafe-url">
        <button type="button">Кнопка 4 — базовая ссылка</button>
      </a>

      <a class="button-link" href="https://nebusfinance.ru/" target="_blank" rel="noopener" referrerpolicy="unsafe-url">
        <button type="button">Кнопка 5 — прямая</button>
      </a>

      <a class="button-link" href="https://it-leads.site/offer_redirect_erid.html" target="_blank" rel="noopener" referrerpolicy="unsafe-url">
        <button type="button">Кнопка 6 — proxy редирект</button>
      </a>
    </div>

    <div class="footer">Одностраничная HTML-страница с 4 кнопками</div>
  </main>
  <script>
    (function () {
      function openExternalLink(url) {
        if (window.Telegram?.WebApp) {
          window.Telegram.WebApp.openLink(url);
        } else {
          window.open(url, '_blank');
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        window.Telegram?.WebApp?.ready?.();

        function revealTgBadge() {
          var el = document.getElementById('tg-env-badge');
          if (el && window.Telegram?.WebApp) {
            el.classList.add('is-visible');
          }
        }
        revealTgBadge();
        [100, 500, 1500].forEach(function (ms) {
          setTimeout(revealTgBadge, ms);
        });

        document.querySelectorAll('a.button-link').forEach(function (anchor) {
          anchor.addEventListener('click', function (e) {
            if (e.defaultPrevented) return;
            if (e.button !== 0) return;
            if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
            e.preventDefault();
            openExternalLink(anchor.href);
          });
        });
      });
    })();
  </script>
</body>
</html>
